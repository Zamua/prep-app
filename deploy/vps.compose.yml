# VPS overlay for prep (prepcards.app).
#
# Joins the traefik_proxy external network (defined by infra/traefik)
# and declares traefik docker labels so traefik routes prepcards.app
# directly to this container — no nginx-backend hop.
#
# Used via:
#   docker compose -f docker-compose.yml -f deploy/vps.compose.yml ...

services:
  prep:
    networks:
      - traefik_proxy
    # No host port binding on the VPS — traefik reaches the container
    # via the docker network. Critical for docker-rollout: scaling to
    # 2 replicas with the same host port allocation would fail with
    # "Bind for 127.0.0.1:<port> failed: port is already allocated".
    # Explicit empty list overrides the base compose's ports stanza.
    ports: !reset []
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"

      # HTTPS router
      - "traefik.http.routers.prepcards-https.rule=Host(`prepcards.app`) || Host(`www.prepcards.app`)"
      - "traefik.http.routers.prepcards-https.entryPoints=https"
      - "traefik.http.routers.prepcards-https.tls=true"
      - "traefik.http.routers.prepcards-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.prepcards-https.service=prepcards"
      - "traefik.http.routers.prepcards-https.middlewares=prepcards-hsts"

      # HTTP → HTTPS redirect
      - "traefik.http.routers.prepcards-http.rule=Host(`prepcards.app`) || Host(`www.prepcards.app`)"
      - "traefik.http.routers.prepcards-http.entryPoints=http"
      - "traefik.http.routers.prepcards-http.middlewares=prepcards-redirect-https"

      # Middlewares
      - "traefik.http.middlewares.prepcards-redirect-https.redirectScheme.scheme=https"
      - "traefik.http.middlewares.prepcards-redirect-https.redirectScheme.permanent=true"
      - "traefik.http.middlewares.prepcards-hsts.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.prepcards-hsts.headers.stsIncludeSubdomains=true"

      # Service definition + active healthcheck
      - "traefik.http.services.prepcards.loadbalancer.server.port=8082"
      - "traefik.http.services.prepcards.loadbalancer.healthCheck.path=/healthz"
      - "traefik.http.services.prepcards.loadbalancer.healthCheck.interval=10s"
      - "traefik.http.services.prepcards.loadbalancer.healthCheck.timeout=3s"

networks:
  traefik_proxy:
    external: true
