<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f5efe6" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1612" media="(prefers-color-scheme: dark)">
  <title>{% block title %}prep{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ request.scope.get('root_path','') }}/static/style.css">
</head>
<body class="page-{% block page_class %}default{% endblock %}">
  <div class="paper">
    <header class="masthead">
      <a href="{{ request.scope.get('root_path','') }}/" class="masthead-brand">
        <span class="brand-mark">P</span>
        <span class="brand-word">Prep&nbsp;·&nbsp;<em>a commonplace book</em></span>
      </a>
      {% block header_extra %}{% endblock %}
    </header>
    <main class="folio">
      {% block main %}{% endblock %}
    </main>
    <footer class="colophon">
      <span class="rule"></span>
      <span class="colophon-text">set in <em>Fraunces</em> &amp; <em>JetBrains&nbsp;Mono</em></span>
    </footer>
  </div>
</body>
</html>
