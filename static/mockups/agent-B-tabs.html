<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mock B · tabs · agent settings</title>
<link rel="stylesheet" href="/prep-staging/static/css/index.css">
<style>
  body { background: var(--bg); color: var(--ink); font-family: var(--serif); padding: 1.25rem var(--safe-side) 4rem; max-width: var(--measure-tight); margin: 0 auto; }
  .mock-banner { background: var(--quill); color: var(--paper); padding: 0.4rem 0.75rem; border-radius: 6px; font-size: 0.78rem; margin-bottom: 1rem; font-style: italic; }
  .prelude { margin-bottom: 1rem; }
  .prelude .eyebrow { font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-mute); margin: 0 0 0.25rem; }
  .prelude .display { font-size: 1.6rem; font-style: italic; margin: 0 0 0.5rem; line-height: 1.15; }
  .prelude .lede { color: var(--ink-soft); font-size: 0.92rem; margin: 0 0 0.85rem; line-height: 1.4; }
  .ds { display: flex; gap: 0.4rem; margin-bottom: 1rem; }
  .ds button { flex: 1; padding: 0.55rem 0.6rem; border-radius: 999px; border: 1px solid var(--rule); background: transparent; color: var(--ink-soft); font: inherit; font-size: 0.85rem; cursor: pointer; }
  .ds button.is-active { background: var(--paper); border-color: var(--quill); color: var(--ink); }

  /* Provider tab strip */
  .prov-tabs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.4rem; margin-bottom: 1.1rem; }
  .prov-tab { padding: 0.65rem 0.65rem; border: 1px solid var(--hairline); border-radius: 10px; background: transparent; color: var(--ink-soft); font: inherit; font-style: italic; text-align: left; cursor: pointer; position: relative; }
  .prov-tab .lbl { display: block; font-size: 0.95rem; color: var(--ink); }
  .prov-tab .sub { display: block; font-size: 0.72rem; color: var(--ink-mute); margin-top: 0.15rem; font-style: normal; letter-spacing: 0.05em; text-transform: uppercase; }
  .prov-tab.is-active { background: var(--paper); border-color: var(--quill); }
  .prov-tab .dot { position: absolute; top: 0.5rem; right: 0.55rem; width: 6px; height: 6px; border-radius: 50%; background: var(--right); }
  .prov-tab.unset .dot { background: var(--ink-mute); opacity: 0.4; }

  .key-form { border-top: 1px solid var(--hairline); padding-top: 1rem; }
  .key-status { display: flex; align-items: baseline; gap: 0.5rem; margin: 0 0 0.5rem; }
  .key-status strong { font-style: italic; }
  .key-status .key { font-family: var(--mono); font-size: 0.82rem; color: var(--ink-soft); }
  .hint { font-size: 0.85rem; color: var(--ink-mute); font-style: italic; margin: 0 0 0.55rem; }
  textarea { width: 100%; box-sizing: border-box; padding: 0.55rem 0.65rem; border-radius: 8px; border: 1px solid var(--rule); background: var(--paper); color: var(--ink); font: inherit; font-family: var(--mono); font-size: 0.85rem; min-height: 4.5em; }
  .btn-row { display: flex; gap: 0.5rem; margin-top: 0.55rem; flex-wrap: wrap; }
  .btn { padding: 0.55rem 0.95rem; border-radius: 999px; border: 1px solid var(--rule); background: transparent; color: var(--ink); font: inherit; font-size: 0.88rem; cursor: pointer; }
  .btn.primary { background: var(--paper); border-color: var(--quill); }
  .btn.quiet { color: var(--ink-soft); }
</style>
</head>
<body>

  <div class="mock-banner">Mockup B · tabs · ~750px page height (vs ~2700px current)</div>

  <section class="prelude">
    <p class="eyebrow">AI</p>
    <h1 class="display">Prep <em>↔</em> AI.</h1>
    <p class="lede">Embed an agent, or let an outside agent use prep.</p>
    <div class="ds">
      <button class="is-active">→ Embed an agent</button>
      <button>← External MCP</button>
    </div>
  </section>

  <div class="prov-tabs">
    <button class="prov-tab is-active">
      <span class="lbl">Claude subscription</span>
      <span class="sub">Active · oat01</span>
      <span class="dot"></span>
    </button>
    <button class="prov-tab">
      <span class="lbl">Anthropic</span>
      <span class="sub">Connected · api03</span>
      <span class="dot"></span>
    </button>
    <button class="prov-tab unset">
      <span class="lbl">OpenAI</span>
      <span class="sub">not set</span>
      <span class="dot"></span>
    </button>
    <button class="prov-tab unset">
      <span class="lbl">OpenRouter</span>
      <span class="sub">not set</span>
      <span class="dot"></span>
    </button>
  </div>

  <div class="key-form">
    <p class="key-status"><strong>Claude subscription</strong> · <span class="key">sk-ant-oat01-…wxyz</span></p>
    <p class="hint">Run <code>claude setup-token</code>, paste below. Bills your Max-plan pool. <a href="#">Docs</a>.</p>
    <textarea placeholder="sk-ant-oat01-…"></textarea>
    <div class="btn-row">
      <button class="btn primary">Replace</button>
      <button class="btn quiet">Remove</button>
      <button class="btn">Use for AI calls</button>
    </div>
  </div>

</body>
</html>
