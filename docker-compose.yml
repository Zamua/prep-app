# Docker compose for prep — single-container architecture.
#
# Post-SDK-migration (2026-05-30): there used to be a sister `agent`
# container that wrapped the `claude` CLI. The Python `claude-agent-sdk`
# package replaced it — Claude calls now happen in-process inside the
# prep container (FastAPI + Temporal devserver + Go worker all under
# goreman, same as before). One service, one volume.
#
# `docker compose up -d` works out of the box with no .env file. Set
# CLAUDE_CODE_OAUTH_TOKEN (from `claude setup-token` on a machine you
# control) via .env or via the /settings/agent UI to activate AI
# features. PREP_INTERNAL_TOKEN guards the worker's internal callback
# to /api/agent/run — generated fresh per deploy.
#
# For the staging-vs-prod split, prefer `make deploy-stag` /
# `make deploy-prod` — they layer this base file with `deploy/*.env`
# and stamp images with `IMAGE_TAG` so multiple versions can coexist
# on the same daemon.

services:
  prep:
    build:
      context: .
      dockerfile: docker/Dockerfile.prep
    image: prep:${IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "${PREP_HOST_PORT:-8082}:8082"
    volumes:
      - prep-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "3", "http://127.0.0.1:8082/healthz"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 30s
    environment:
      # ---- agent / SDK ----------------------------------------------
      # Worker hits prep's own FastAPI handler in-process. Same container,
      # so localhost is correct.
      PREP_AGENT_URL: http://localhost:8082/api/agent
      # Shared secret the /api/agent/run handler requires in
      # X-Internal-Token. Random per deploy. Fail-closed: if unset,
      # the endpoint refuses all calls.
      PREP_INTERNAL_TOKEN: ${PREP_INTERNAL_TOKEN:?PREP_INTERNAL_TOKEN must be set (random string in .env / deploy/*.env)}
      # OAuth token from `claude setup-token`. Optional at boot — the
      # /settings/agent UI can paste one later, which writes to
      # /data/claude-oauth-token and reloads in-process.
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      # Temporal devserver lives in this container.
      TEMPORAL_HOST_PORT: 127.0.0.1:7233

      # ---- per-deploy overrides (defaulted) -------------------------
      ROOT_PATH: ${ROOT_PATH:-}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-prep}
      # PREP_DEFAULT_USER: ${VAR-default} (single-dash) so an explicit
      # empty disables the bypass in multi-user deploys, which must
      # enforce Tailscale auth.
      PREP_DEFAULT_USER: ${PREP_DEFAULT_USER-guest}
      PREP_VAPID_SUB: ${PREP_VAPID_SUB:-mailto:noreply@example.com}

volumes:
  # Env-driven name so staging + prod can run side-by-side on one
  # daemon. Default 'prep' for ad-hoc. `make deploy-prod` sets
  # ENV_NAME=prod → volume named `prod-data`.
  prep-data:
    name: ${ENV_NAME:-prep}-data
