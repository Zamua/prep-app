# Docker compose for prep. Two services: the app stack (uvicorn +
# temporal devserver + worker, all in one container via goreman) and
# the agent (claude wrapper, separate lifecycle + auth volume).
#
# The compose file deliberately drops the v0.9 separation between
# "staging" and "prod" — for any given checkout you get ONE stack.
# Run side-by-side environments by either: (a) two checkouts with
# different .env files + different `-p <project>` namespaces, or
# (b) on different hosts. The "two checkouts of the same repo" pattern
# the author uses on the macmini falls under (a).
#
# .env file lives at the repo root and isn't committed (see
# .gitignore). Copy from .env.example to start:
#   cp .env.example .env && $EDITOR .env

services:
  prep:
    build:
      context: .
      dockerfile: docker/Dockerfile.prep
    image: prep:dev
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PREP_HOST_PORT:-8082}:8082"
    volumes:
      - prep-data:/data
    depends_on:
      agent:
        condition: service_started
        required: false
    environment:
      # Worker reaches the agent via the compose service name.
      PREP_AGENT_URL: http://agent:9999
      # Internal temporal devserver runs in this same container —
      # 127.0.0.1 inside the container is correct.
      TEMPORAL_HOST_PORT: 127.0.0.1:7233

  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
    image: prep-agent:dev
    restart: unless-stopped
    # No host port mapping by default — only the prep service needs to
    # reach this. To debug from the host (curl /healthz etc) uncomment
    # the ports stanza or `docker compose up -d agent` then `docker
    # compose port agent 9999`.
    # ports:
    #   - "9999:9999"
    volumes:
      - prep-agent-data:/data

volumes:
  # Volume names are env-driven so the same compose.yml can run as
  # staging AND prod on the same machine without colliding. ENV_NAME
  # defaults to "prep" for backwards compatibility with the original
  # staging cutover (which named volumes literally `prep-data` +
  # `prep-agent-data`). Prod's .env sets ENV_NAME=prod → `prod-data`
  # + `prod-agent-data`.
  prep-data:
    name: ${ENV_NAME:-prep}-data
  prep-agent-data:
    name: ${ENV_NAME:-prep}-agent-data
