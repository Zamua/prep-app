# Docker compose for prep. Two services: the app stack (uvicorn +
# temporal devserver + worker, all in one container via goreman) and
# the agent (claude wrapper, separate lifecycle + auth volume).
#
# `docker compose up -d` works out of the box with no .env file — every
# variable that affects runtime has a sensible default. Override any of
# them by creating a .env file in this directory (see .env.example for
# the full set + comments).
#
# For the staging-vs-prod split, prefer `make deploy-stag` /
# `make deploy-prod` — they layer this base file with `deploy/*.env`
# and stamp images with `IMAGE_TAG` so multiple versions can coexist
# on the same daemon.

services:
  prep:
    build:
      context: .
      dockerfile: docker/Dockerfile.prep
    # Versioned image tag. Defaults to `:dev` for ad-hoc `docker compose
    # up`. The deploy targets pass IMAGE_TAG=staging or IMAGE_TAG=v0.X.Y
    # so prod and staging images live side-by-side in the daemon's cache.
    image: prep:${IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "${PREP_HOST_PORT:-8082}:8082"
    volumes:
      - prep-data:/data
    depends_on:
      agent:
        condition: service_started
        required: false
    environment:
      # ---- network / topology (rarely changed) ----------------------
      # Worker reaches the agent via the compose service name.
      PREP_AGENT_URL: http://agent:9999
      # Internal temporal devserver runs in this same container —
      # 127.0.0.1 inside the container is correct.
      TEMPORAL_HOST_PORT: 127.0.0.1:7233

      # ---- per-deploy overrides (defaulted) -------------------------
      # URL prefix the app generates. Empty = serve at root. Set to
      # /prep (or whatever) when path-mounting behind a reverse proxy.
      ROOT_PATH: ${ROOT_PATH:-}
      # Internal temporal namespace. Doesn't matter for a single
      # deployment; differs between staging + prod when running both.
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-prep}
      # Auth bypass: when set (and non-empty), every header-less request
      # becomes this user. Default is empty → bypass disabled → real
      # Tailscale identity required. For a single-user single-machine
      # bring-up without Tailscale, set PREP_DEFAULT_USER=guest in a
      # local .env. The real multi-user auth path is Tailscale Serve,
      # which injects per-user identity headers and makes this var
      # redundant.
      PREP_DEFAULT_USER: ${PREP_DEFAULT_USER:-}
      # IANA "sub" claim push services see if they need to contact
      # the operator. Optional but good practice in real deploys.
      PREP_VAPID_SUB: ${PREP_VAPID_SUB:-mailto:noreply@example.com}

  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent
    image: prep-agent:${IMAGE_TAG:-dev}
    restart: unless-stopped
    # No host port mapping by default — only the prep service needs to
    # reach this. Add a `ports:` stanza if you want to debug from the
    # host (curl /healthz etc).
    volumes:
      - prep-agent-data:/data

volumes:
  # Volume names are env-driven so the same compose.yml can run as
  # staging AND prod on the same docker daemon without colliding.
  # Default 'prep' works for any single deployment. The two-stack
  # flow (`make deploy-prod`) sets ENV_NAME=prod via deploy/prod.env
  # → volumes named `prod-data` + `prod-agent-data`.
  prep-data:
    name: ${ENV_NAME:-prep}-data
  prep-agent-data:
    name: ${ENV_NAME:-prep}-agent-data
